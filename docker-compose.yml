services:
  prepped:
    build:
      context: .
      args:
        AUTH_MODE: ${AUTH_MODE:-password}
        UI_LOCALE: ${UI_LOCALE:-en}
        INVITE_CODE: ${INVITE_CODE:-}
        MEASUREMENT_SYSTEM: ${MEASUREMENT_SYSTEM:-metric}
        DATE_LOCALE: ${DATE_LOCALE:-}
    ports:
      - "4321:4321"
    volumes:
      - prepped-data:/app/data
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped

volumes:
  prepped-data:
